# ============================================================
# aigc-creator nginx 配置
# 部署到 /etc/nginx/sites-available/aigc-creator
# 符号链接到 /etc/nginx/sites-enabled/
# ============================================================

# 启用 gzip 压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/rss+xml
  image/svg+xml
  font/woff2
  application/wasm;

server {
    listen 443 ssl http2;
    server_name 041105.best;

    # TLS 配置 (certbot 或手动证书)
    ssl_certificate     /etc/letsencrypt/live/041105.best/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/041105.best/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Next.js 静态资源: immutable 长缓存 ---
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # --- 封面图片: 短缓存 + stale-while-revalidate ---
    location /covers/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
        access_log off;
    }

    # --- API 反代: 走 Docker 内部 ---
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # --- Next.js 应用: HTML 页面 ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name 041105.best;
    return 301 https://$host$request_uri;
}
