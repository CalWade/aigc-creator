# ============================================================
# bytedance-aigc 生产部署 Docker Compose
# 运行在远程服务器 150.5.131.18
#
# 服务拓扑:
#   api       → NestJS 后端,宿主机 127.0.0.1:4000
#   postgres  → PG 16,宿主机 127.0.0.1:5433 (避让 cmcmhealth 的 5432)
#   redis     → Redis 7,宿主机 127.0.0.1:6379
#   minio     → S3 兼容存储,宿主机 127.0.0.1:9002/9003 (避让 cmcmhealth 的 9000/9001)
#
# 前端 (web 单 app) 由 nginx 直接 serve 静态产物,
# 不走 Docker——Next.js standalone 产物的 Docker 镜像太重 (8GB 磁盘不够)。
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: bytedance_aigc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bytedance_aigc_2026}
      POSTGRES_DB: bytedance_aigc
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bytedance_aigc"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://bytedance_aigc:${POSTGRES_PASSWORD:-bytedance_aigc_2026}@postgres:5432/bytedance_aigc
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: bytedance-aigc
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://041105.best/api/assets}
      S3_FORCE_PATH_STYLE: "true"
      REPUBLISH_HOTNESS_INHERIT: "true"
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  minio_data:
