- rule_id: SEC-FRAUD-001
  category: fraud
  severity: high
  description: 虚假宣传 / 引流诈骗
  prompt_hint: |
    若文本含虚假效果承诺(暴富/秒到账/包治百病)、留联系方式引流、未经核实数据,判 medium 或 high。典型模式:"日入过千""月入过万""打字兼职""代发视频""500元一个字""无前期下款""投资10元快速裂变""加我微信""私聊我""➕V"。
  examples_positive:
    - "想做兼职的宝宝可以多多给好评哦500元一个字评论完成即可领取工资"
    - "我这有个好玩的投资10元可以快速裂变，快速赚钱的，做好了单日收入800-3000"
    - "无前期 5k-5w额度当天下款 有意愿私"
    - "➕我V我带你，一部手机日进3一5位数只需要投资10元"
    - "合约带单，每天保底收益本金20％，可试单，详情私"
  examples_negative:
    - "市场监管局发布反诈宣传材料。"
    - "学习新技能三个月计划：研究目标、分析现有知识、寻找资源"
