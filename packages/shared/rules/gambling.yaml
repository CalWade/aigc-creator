  examples_positive:
    - "大满贯 863u.top"
    - "手机金花🌸牛牛🐂 有人完嘛"
    - "信誉pingtai 金海岸1.8日开叶 注冊宋38"
    - "后面加入东升国际 光头小子踢足球开始认真,船长也没有在欺骗,东升国际：gj777.top"
    - "新人注册就送38~888元红包网址:cce7.top"
