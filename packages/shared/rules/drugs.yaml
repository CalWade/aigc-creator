# drugs 类目规则
# 混合审核 LLM 兜底路径使用;Guard 有独立 contraband_drug 标签
- rule_id: SEC-DRUG-001
  category: drugs
  severity: high
  description: 毒品交易、购买渠道、推广信息
  prompt_hint: |
    若文本涉及毒品交易/购买/渠道(如"冰毒""海洛因""大麻""摇头丸""K粉""可卡因""鸦片""吗啡""甲基苯丙胺""麻古"),判 high;提及毒品但为反毒科普/新闻报道判 medium。暗语与明文等效(如"溜冰"=吸食冰毒、"飞了"=吸毒后体验、"上头电子烟"=含依托咪酯的电子烟、"白粉"=海洛因)。
  examples_positive:
    - "冰毒纯度怎么辨别？想搞点高纯度的货"
    - "有没有靠谱的海洛因渠道，私聊我价格"
    - "大麻烟哪里买？想试试飞的感觉"
    - "上头电子烟里面加了依托咪酯 飞了"
    - "笑气一箱出 酒吧KTV必备"
  examples_negative:
    - "禁毒日社区组织了反毒宣传活动。"
    - "海洛因成瘾是一种脑部疾病,需要医学治疗。"
    - "警方破获一起冰毒走私案,缴获毒品30公斤。"
- rule_id: SEC-DRUG-002
  category: drugs
  severity: high
  description: 吸毒体验分享、诱导他人尝试
  prompt_hint: |
    若文本分享吸毒体验、诱导他人尝试(如"溜冰的感觉""飞了""一口一个""一粒就能嗨整晚"),判 high;语气美化吸毒行为(如"绝了""刺激""爽")同样判 high。
  examples_positive:
    - "摇头丸配蹦迪简直绝了，一粒就能嗨整晚"
    - "冰毒效果真不错，鼻吸5分钟上头"
    - "注射过量海洛因是什么体验 分享一下"
    - "吸毒后开车真的很刺激 大家都试试"
    - "芬太尼贴片自己贴太爽了 比注射方便"
  examples_negative:
    - "戒毒所里的小王讲述了自己从吸毒到康复的经历。"
- rule_id: SEC-DRUG-003
  category: drugs
  severity: high
  description: 毒品制作方法、藏匿方法
  prompt_hint: |
    若文本描述毒品制作方法(如"在家提炼冰毒""提取大麻油教程")或藏匿方法(如"白粉怎么藏最安全 过安检没问题"),判 high。
  examples_positive:
    - "教你自己在家提炼冰毒，原料到处都有"
    - "大麻油自己在家提取教程很简单"
    - "白粉怎么藏最安全 过安检没问题"
  examples_negative:
    - "化学课上老师讲解了冰毒的分子结构,强调其危害性。"
